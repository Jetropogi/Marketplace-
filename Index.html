<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Marketplace</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <header>
    <h1>Debesmscat School Marketplace System</h1>
  </header>
  
  <main>
    <h2 class="login-title" style="color: green">Login Form</h2>
    <div class="form-container">
      <form id="loginForm">
        <label for="username">Name</label>
        <input type="text" id="username" name="username" placeholder="Enter Name" required>
        
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="Enter Password" required>
          <button type="button" id="togglePassword" class="toggle-btn">Show</button>
        </div>
        
        <p id="error" style="color:red; display:none; font-size:0.9rem;">Wrong password</p>
        <button type="submit" class="button">Confirm</button>
      </form>
    </div>
  </main>
  
  <footer>
    <p>Jetro M. Bantayan / 2026</p>
  </footer>
  
  <script>
    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('password');
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('error');
    
    // Show/hide password
    togglePassword.addEventListener('click', function () {
      if (password.type === 'password') {
        password.type = 'text';
        this.textContent = 'Hide';
      } else {
        password.type = 'password';
        this.textContent = 'Show';
      }
    });

    // Check password and redirect
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault(); // stop normal form submission
      
      const correctPassword = "admin123"; // change this to your password
      const enteredPassword = password.value;
      
      if (enteredPassword === correctPassword) {
        window.location.href = "home.html"; // redirect to homepage
      } else {
        errorMsg.style.display = "block";
      }
    });
  </script>
</body>
</html>
