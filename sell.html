<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sell Item - School Marketplace</title>
  <link rel="stylesheet" href="index.css">
  <style>
.top-bar {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 1000;
}
.top-bar.button {
  text-decoration: none;
  display: inline-block;
  padding: 10px 20px;
  font-size: 0.9rem;
  font-weight: 600;
  color: #1f2937;
  background: rgba(255, 255, 255, 0.18);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
  border-radius: 22px;
  transition: all 0.2s ease;
}
.top-bar.button:hover {
  background: rgba(255, 255, 255, 0.28);
  transform: translateY(-2px);
}

main { padding-top: 80px; }

.form-container {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
  width: 95%;
  max-width: 950px;
  margin: 0 auto;
  text-align: center;
}

#sellForm {
  max-width: 500px;
  margin: 0 auto;
  text-align: left;
}

.tab-switch {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  justify-content: center;
}

/* Updated tab buttons */
.tab-btn {
  padding: 10px 24px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
  cursor: pointer;
  font-weight: 600;
  font-family: "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
  font-size: 15px;
  letter-spacing: 0.5px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  transition: all 0.2s ease;
  backdrop-filter: blur(8px);
}
.tab-btn.active {
  background: rgba(255, 255, 255, 0.35);
  border-color: rgba(255, 255, 255, 0.6);
  font-weight: 700;
}
.tab-btn:hover {
  background: rgba(255, 255, 255, 0.25);
  transform: translateY(-1px);
}

.tab-content { display: none; }
.tab-content.active { display: block; }

.login-title {
  text-align: center;
  color: #fff;
  font-size: 28px;
  margin: 0 0 24px 0;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  font-weight: 400;
}

/* PRICE INPUT WITH ₱ SIGN */
.price-input {
  position: relative;
  width: 100%;
  max-width: 500px;
  margin: 0 auto 15px auto;
}

.price-input.peso-sign {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #fff;
  font-size: 16px;
  pointer-events: none;
}

.price-input input {
  width: 100%;
  padding: 12px 12px 12px 28px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 12px;
  font-size: 16px;
  font-family: "Times New Roman", Times, serif;
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
  outline: none;
}

/* GRID */
.item-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  justify-items: center;
  justify-content: center;
}

.item-card {
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 12px;
  padding: 12px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  width: 100%;
  max-width: 300px;
  text-align: center;
}

.item-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
}

.item-card img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 8px;
}

.item-card h4 {
  margin: 0 0 4px;
  color: #fff;
  font-size: 0.95rem;
}

.item-card p {
  margin: 2px 0;
  color: rgba(255, 255, 255, 0.9);
  font-size: 0.85rem;
}

.empty-msg {
  text-align: center;
  color: rgba(255, 255, 255, 0.8);
  padding: 20px 0;
}

.image-preview {
  width: 100%;
  max-width: 400px;
  height: 200px;
  margin: 0 auto 15px auto;
  border-radius: 12px;
  border: 1px dashed rgba(255,255,255,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: rgba(255,255,255,0.1);
}

.image-preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

label {
  display: block;
  margin: 14px 0 6px;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}

input[type="text"],
input[type="file"] {
  width: 100%;
  max-width: 500px;
  margin: 0 auto 15px auto;
  display: block;
}

input[type="text"] {
  padding: 12px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 12px;
  font-size: 16px;
  font-family: "Times New Roman", Times, serif;
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
  outline: none;
}

.button {
  display: block;
  width: 100%;
  max-width: 300px;
  margin: 20px auto 0 auto;
  padding: 14px;
  background: rgba(255, 255, 255, 0.18);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.35);
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
  font-family: "Times New Roman", Times, serif;
  font-weight: bold;
  transition: transform 0.15s ease, background 0.15s ease;
}

.button:hover {
  background: rgba(255, 255, 255, 0.28);
  transform: translateY(-2px);
}

/* MODAL - LIQUID GLASS */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal.active { display: flex; }

.modal-content {
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 20px;
  max-width: 500px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 28px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  animation: popIn 0.25s ease-out;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-image {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 16px;
}

.modal-name {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 8px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  text-align: center;
}

.modal-price {
  font-size: 26px;
  color: #ff8a65;
  font-weight: 700;
  margin-bottom: 16px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  text-align: center;
}

.modal-desc {
  font-size: 15px;
  color: rgba(255, 255, 255, 0.9);
  line-height: 1.6;
  margin-bottom: 20px;
  text-align: center;
  padding: 0 10px;
}

.modal-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.modal-btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.3);
  font-weight: 600;
  cursor: pointer;
  font-size: 15px;
  backdrop-filter: blur(8px);
  transition: all 0.2s ease;
}

.modal-btn.edit {
  background: rgba(59, 130, 246, 0.3);
  color: #fff;
}
.modal-btn.edit:hover {
  background: rgba(59, 130, 246, 0.5);
  transform: translateY(-1px);
}

.modal-btn.delete {
  background: rgba(239, 68, 68, 0.3);
  color: #fff;
}
.modal-btn.delete:hover {
  background: rgba(239, 68, 68, 0.5);
  transform: translateY(-1px);
}

.modal-btn.save {
  background: rgba(34, 197, 94, 0.3);
  color: #fff;
}
.modal-btn.save:hover {
  background: rgba(34, 197, 94, 0.5);
  transform: translateY(-1px);
}

.modal-btn.close {
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
}
.modal-btn.close:hover {
  background: rgba(255, 255, 255, 0.25);
  transform: translateY(-1px);
}

/* EDIT MODE CONTAINERS - LIQUID GLASS */
.edit-field-container {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 18px;
}

.edit-label {
  font-size: 12px;
  color: rgba(255, 255, 255, 0.9);
  margin-bottom: 6px;
  display: block;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.prev-value {
  font-size: 15px;
  color: #fff;
  margin-bottom: 10px;
  padding: 12px 14px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.15);
  text-align: center;
}

.edit-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 8px;
  font-size: 15px;
  color: #fff;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(8px);
  box-sizing: border-box;
}

.edit-input::placeholder {
  color: rgba(255, 255, 255, 0.6);
}

.edit-input:focus {
  outline: none;
  border-color: rgba(59, 130, 246, 0.6);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
  background: rgba(255, 255, 255, 0.12);
}

.item-actions,.btn-sm { display: none; }

@media (min-width: 600px) {
 .item-list {
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 18px;
  }
 .form-container {
    max-width: 1100px;
    padding: 50px;
  }
}
  </style>
</head>
<body>
  <main>
    <div class="top-bar">
      <a href="Home.html" class="button">← Back</a>
    </div>
    <div class="form-container">
      <div class="tab-switch">
        <button type="button" class="tab-btn active" data-tab="sell">Post</button>
        <button type="button" class="tab-btn" data-tab="view">View</button>
      </div>

      <!-- Sell Item Form -->
      <div id="sell" class="tab-content active">
        <h2 class="login-title">Sell an Item</h2>
        <form id="sellForm">
          <label for="item">Item Name</label>
          <input type="text" id="item" placeholder="e.g. Notebook, Uniform" required>

          <label for="price">Price</label>
          <div class="price-input">
            <span class="peso-sign">₱</span>
            <input type="text" id="price" placeholder="150" inputmode="numeric">
          </div>

          <label for="desc">Description</label>
          <input type="text" id="desc" placeholder="Condition, size, etc." required>

          <label for="image">Product Image</label>
          <input type="file" id="image" accept="image/*">
          <div class="image-preview" id="preview">
            <span style="color:rgba(255,255,255,0.7)">No image selected</span>
          </div>

          <p id="success" style="color:#22c55e; display:none; font-size:0.9rem; background:#ecfdf5; padding:8px; border-radius:6px; text-align:center;">
            Item posted!
          </p>
          <button type="submit" class="button">Post Item</button>
        </form>
      </div>

      <!-- View Posted Items -->
      <div id="view" class="tab-content">
        <h2 class="login-title">Your Posted Items</h2>
        <div id="myItems" class="item-list"></div>
      </div>
    </div>
  </main>

  <!-- Modal for viewing/editing item -->
  <div id="itemModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div id="modalBody"></div>
    </div>
  </div>

  <footer>
    <p>Jetro M. Bantayan / 2026</p>
  </footer>

  <script>
    let imageData = null;
    let currentViewIndex = null;
    let editMode = false;
    const MAX_SIZE_MB = 10;
    const MAX_SIZE_BYTES = MAX_SIZE_MB * 1024 * 1024;

    // Auto-format price input
    const priceInput = document.getElementById('price');
    priceInput.addEventListener('input', function(e) {
      let val = e.target.value.replace(/[^0-9.]/g, '');
      const parts = val.split('.');
      if (parts.length > 2) {
        val = parts[0] + '.' + parts.slice(1).join('');
      }
      e.target.value = val;
    });

    // Preview image
    document.getElementById('image').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > MAX_SIZE_BYTES) {
        alert(`File is too large. Max size is ${MAX_SIZE_MB}MB.`);
        this.value = '';
        document.getElementById('preview').innerHTML = '<span style="color:rgba(255,255,255,0.7)">No image selected</span>';
        imageData = null;
        return;
      }
      const reader = new FileReader();
      reader.onload = function(ev) {
        imageData = ev.target.result;
        document.getElementById('preview').innerHTML = `<img src="${imageData}" alt="preview">`;
      };
      reader.readAsDataURL(file);
    });

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
        if (btn.dataset.tab === 'view') loadMyItems();
      });
    });

    // Submit form
    document.getElementById('sellForm').addEventListener('submit', function(e) {
      e.preventDefault();
      let priceVal = document.getElementById('price').value.trim();
      if (priceVal &&!priceVal.startsWith('₱')) {
        priceVal = '₱' + priceVal;
      }
      const item = {
        name: document.getElementById('item').value,
        price: priceVal,
        desc: document.getElementById('desc').value,
        image: imageData
      };
      const items = JSON.parse(localStorage.getItem('items') || '[]');
      items.push(item);
      localStorage.setItem('items', JSON.stringify(items));
      document.getElementById('success').style.display = 'block';
      this.reset();
      imageData = null;
      document.getElementById('preview').innerHTML = '<span style="color:rgba(255,255,255,0.7)">No image selected</span>';
      setTimeout(() => {
        document.getElementById('success').style.display = 'none';
      }, 2000);
    });

    // Load user's items
    function loadMyItems() {
      const items = JSON.parse(localStorage.getItem('items') || '[]');
      const container = document.getElementById('myItems');
      if (items.length === 0) {
        container.innerHTML = '<p class="empty-msg">You haven\'t posted anything yet</p>';
        return;
      }
      container.innerHTML = items.map((item, index) => `
        <div class="item-card" onclick="viewItem(${index})">
          ${item.image? `<img src="${item.image}" alt="${item.name}">` : ''}
          <h4>${item.name}</h4>
          <p><strong>Price:</strong> ${item.price}</p>
          <p>${item.desc}</p>
        </div>
      `).join('');
    }

    // Open modal view
    function viewItem(index) {
      const items = JSON.parse(localStorage.getItem('items') || '[]');
      const item = items[index];
      currentViewIndex = index;
      editMode = false;
      renderModal(item);
      document.getElementById('itemModal').classList.add('active');
    }

    function renderModal(item) {
      if (!editMode) {
        document.getElementById('modalBody').innerHTML = `
          ${item.image? `<img src="${item.image}" class="modal-image" alt="${item.name}">` : ''}
          <div class="modal-name">${item.name}</div>
          <div class="modal-price">${item.price}</div>
          <div class="modal-desc">${item.desc}</div>
          <div class="modal-actions">
            <button class="modal-btn edit" onclick="enableEdit(event)">Edit</button>
            <button class="modal-btn delete" onclick="deleteFromModal()">Delete</button>
            <button class="modal-btn close" onclick="closeModal()">Close</button>
          </div>
        `;
      } else {
        document.getElementById('modalBody').innerHTML = `
          <div class="edit-field-container">
            <div class="edit-label">Product Image</div>
            <div class="image-preview" id="editPreview">
              ${item.image? `<img src="${item.image}" alt="preview">` : '<span style="color:rgba(255,255,255,0.6)">No image</span>'}
            </div>
            <input type="file" id="editImage" accept="image/*">
          </div>

          <div class="edit-field-container">
            <div class="edit-label">Item Name</div>
            <div class="prev-value">${item.name || '<span style="color:rgba(255,255,255,0.6)">None</span>'}</div>
            <input type="text" id="editName" class="edit-input" value="${item.name || ''}">
          </div>

          <div class="edit-field-container">
            <div class="edit-label">Price</div>
            <div class="prev-value">${item.price || '<span style="color:rgba(255,255,255,0.6)">None</span>'}</div>
            <input type="text" id="editPrice" class="edit-input" value="${item.price || ''}">
          </div>

          <div class="edit-field-container">
            <div class="edit-label">Description</div>
            <div class="prev-value">${item.desc || '<span style="color:rgba(255,255,255,0.6)">None</span>'}</div>
            <input type="text" id="editDesc" class="edit-input" value="${item.desc || ''}">
          </div>

          <div class="modal-actions">
            <button class="modal-btn save" onclick="saveEdit()">Save</button>
            <button class="modal-btn close" onclick="cancelEdit()">Cancel</button>
          </div>
        `;

        document.getElementById('editImage').addEventListener('change', function(e) {
          const file = e.target.files[0];
          if (!file) return;
          if (file.size > MAX_SIZE_BYTES) {
            alert(`File is too large. Max size is ${MAX_SIZE_MB}MB.`);
            this.value = '';
            return;
          }
          const reader = new FileReader();
          reader.onload = function(ev) {
            imageData = ev.target.result;
            document.getElementById('editPreview').innerHTML = `<img src="${imageData}" alt="preview">`;
          };
          reader.readAsDataURL(file);
        });
      }
    }

    function enableEdit(event) {
      event.stopPropagation();
      editMode = true;
      imageData = null;
      const items = JSON.parse(localStorage.getItem('items') || '[]');
      renderModal(items[currentViewIndex]);
    }

    function cancelEdit() {
      editMode = false;
      imageData = null;
      const items = JSON.parse(localStorage.getItem('items') || '[]');
      renderModal(items[currentViewIndex]);
    }

    function saveEdit() {
      const items = JSON.parse(localStorage.getItem('items') || '[]');
      items[currentViewIndex].name = document.getElementById('editName').value;
      let priceVal = document.getElementById('editPrice').value.trim();
      if (priceVal &&!priceVal.startsWith('₱')) {
        priceVal = '₱' + priceVal;
      }
      items[currentViewIndex].price = priceVal;
      items[currentViewIndex].desc = document.getElementById('editDesc').value;
      if (imageData) {
        items[currentViewIndex].image = imageData;
      }
      localStorage.setItem('items', JSON.stringify(items));
      editMode = false;
      imageData = null;
      renderModal(items[currentViewIndex]);
      loadMyItems();
      alert('Item updated!');
    }

    function closeModal() {
      document.getElementById('itemModal').classList.remove('active');
      currentViewIndex = null;
      editMode = false;
      imageData = null;
    }

    function deleteFromModal() {
      if (currentViewIndex === null) return;
      if (!confirm('Delete this item?')) return;
      const items = JSON.parse(localStorage.getItem('items') || '[]');
      items.splice(currentViewIndex, 1);
      localStorage.setItem('items', JSON.stringify(items));
      closeModal();
      loadMyItems();
    }
  </script>
</body>
</html>
