<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Items - School Marketplace</title>
  <link rel="stylesheet" href="index.css">
  <style>
.top-bar {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 1000;
}
.top-bar.button {
  text-decoration: none;
  display: inline-block;
  padding: 10px 20px;
  font-size: 0.9rem;
  font-weight: 600;
  color: #1f2937;
  background: rgba(255, 255, 255, 0.18);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
  border-radius: 22px;
  transition: all 0.2s ease;
}
.top-bar.button:hover {
  background: rgba(255, 255, 255, 0.28);
  transform: translateY(-2px);
}

main { padding-top: 80px; }

.browse-container {
  width: 100%;
  max-width: 1200px;
  padding: 0 12px;
  margin: 0 auto;
}

/* 2 columns on mobile, auto-fit for larger screens */
.item-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

/* LIQUID GLASS ITEM CARD */
.item-card {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  cursor: pointer;
}

.item-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  background: rgba(255, 255, 255, 0.15);
  border-color: rgba(255, 255, 255, 0.3);
}

.item-image {
  width: 100%;
  aspect-ratio: 1/1;
  background: rgba(255, 255, 255, 0.05);
  object-fit: cover;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.item-info {
  padding: 10px 12px;
}

.item-name {
  font-size: 14px;
  color: #fff;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  text-decoration: none;
  line-height: 1.3;
  min-height: 36px;
  font-weight: 500;
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
}

.item-name:hover {
  color: #ff8a65;
}

.item-price {
  font-size: 16px;
  color: #ff8a65;
  font-weight: 700;
  margin-top: 6px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.4);
}

.item-desc-preview {
  font-size: 12px;
  color: rgba(255, 255, 255, 0.8);
  margin-top: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* On tablets/desktops show more columns */
@media (min-width: 600px) {
 .item-grid {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }
}
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="home.html" class="button">← Back</a>
  </div>
  <main>
    <div class="browse-container">
      <h2 style="color:#fff; text-align:center; margin-bottom:20px; text-shadow: 0 2px 8px rgba(0,0,0,0.4);">Browse Items</h2>
      <div id="itemGrid" class="item-grid"></div>
    </div>
  </main>
  <script>
    const items = JSON.parse(localStorage.getItem('items') || '[]');
    const grid = document.getElementById('itemGrid');
    
    // Restore scroll position on back
    window.addEventListener('load', () => {
      const scrollPos = sessionStorage.getItem('browseScrollPos');
      if (scrollPos) {
        window.scrollTo(0, parseInt(scrollPos));
        sessionStorage.removeItem('browseScrollPos');
      }
    });

    if (items.length === 0) {
      grid.innerHTML = '<p style="color:#fff; text-align:center; text-shadow: 0 2px 8px rgba(0,0,0,0.4);">No items yet</p>';
    } else {
      grid.innerHTML = items.map((item, index) => `
        <div class="item-card" data-index="${index}">
          ${item.image ? `<img src="${item.image}" class="item-image" alt="${item.name}">` : `<div class="item-image" style="display:flex;align-items:center;justify-content:center;font-size:48px;">🗃️</div>` }
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-price">${item.price}</div>
            <div class="item-desc-preview">${item.desc}</div>
          </div>
        </div>
      `).join('');
      
      // Use event delegation to save scroll before navigating
      grid.addEventListener('click', (e) => {
        const card = e.target.closest('.item-card');
        if (!card) return;
        const index = card.dataset.index;
        sessionStorage.setItem('browseScrollPos', window.scrollY);
        window.location.href = `product.html?id=${index}`;
      });
    }
  </script>
</body>
</html>
