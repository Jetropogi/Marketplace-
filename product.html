<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product - School Marketplace</title>
  <link rel="stylesheet" href="index.css">
  <style>
.top-bar {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 1000;
}
.top-bar.button {
  text-decoration: none;
  display: inline-block;
  padding: 10px 20px;
  font-size: 0.9rem;
  font-weight: 600;
  color: #1f2937;
  background: rgba(255, 255, 255, 0.18);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
  border-radius: 22px;
  transition: all 0.2s ease;
}
.top-bar.button:hover {
  background: rgba(255, 255, 255, 0.28);
  transform: translateY(-2px);
}

main {
  padding-top: 80px;
  display: flex;
  justify-content: center;
}

/* LIQUID GLASS PRODUCT CONTAINER */
.product-container {
  max-width: 800px;
  width: 90%;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 20px;
  padding: 32px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.25);
}

.product-image {
  width: 100%;
  max-width: 400px;
  aspect-ratio: 1/1;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 12px;
  object-fit: cover;
  margin: 0 auto 20px;
  border: 1px solid rgba(255, 255, 255, 0.15);
}

.product-image-placeholder {
  width: 100%;
  max-width: 400px;
  aspect-ratio: 1/1;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  margin: 0 auto 20px;
  border: 1px solid rgba(255, 255, 255, 0.15);
}

.product-name {
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 12px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

.product-price {
  font-size: 32px;
  color: #ff8a65;
  font-weight: 700;
  margin-bottom: 24px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

.product-section {
  border-top: 1px solid rgba(255, 255, 255, 0.15);
  padding-top: 20px;
  margin-top: 20px;
}

.product-section h3 {
  font-size: 17px;
  color: rgba(255, 255, 255, 0.95);
  margin-bottom: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.product-desc {
  font-size: 15px;
  color: rgba(255, 255, 255, 0.9);
  line-height: 1.7;
}

@media (max-width: 600px) {
 .product-container {
    padding: 24px 20px;
    width: 95%;
  }
 .product-name {
    font-size: 22px;
  }
 .product-price {
    font-size: 28px;
  }
}
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="Browse.html" class="button">← Back</a>
  </div>
  <main>
    <div id="productContainer" class="product-container"></div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    const items = JSON.parse(localStorage.getItem('items') || '[]');
    const item = items[id];
    const container = document.getElementById('productContainer');
    if (!item) {
      container.innerHTML = '<p style="color:#fff; text-align:center;">Product not found</p>';
    } else {
      container.innerHTML = `
        ${item.image? `<img src="${item.image}" class="product-image" alt="${item.name}">` : `<div class="product-image-placeholder">🗃️</div>` }
        <div class="product-name">${item.name}</div>
        <div class="product-price">${item.price}</div>
        <div class="product-section">
          <h3>Product Description</h3>
          <div class="product-desc">${item.desc}</div>
        </div>
      `;
      document.title = item.name + ' - School Marketplace';
    }
  </script>
</body>
</html>
